services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eve_market_tools
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:dev@db/eve_market_tools
      TOKEN_ENCRYPTION_KEY: dev-key-not-for-production-32bytes!
      EVE_CLIENT_ID: ${EVE_CLIENT_ID:-}
      EVE_CALLBACK_URL: http://localhost:5173/auth/callback
      CACHE_DIR: /app/.eve_scanner_cache
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - cache_vol:/app/.eve_scanner_cache
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
  cache_vol:
